global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    monitor: 'react-vite-cicd'
    environment: 'production'

# ── Alertmanager Configuration ──
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# ── Rule Files ──
rule_files:
  - "alerts/*.yml"

# ── Scrape Configurations ──
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/metrics'

  # React Application (Nginx metrics via stub)
  - job_name: 'react-app-staging'
    static_configs:
      - targets: ['app-staging:80']
    metrics_path: '/metrics'
    scrape_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'staging-app'

  - job_name: 'react-app-production'
    static_configs:
      - targets: ['app-production:80']
    metrics_path: '/metrics'
    scrape_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'production-app'

  # Node Exporter (system metrics) - optional
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'host-system'
