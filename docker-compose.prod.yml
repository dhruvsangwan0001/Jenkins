version: '3.8'

services:
  # ── React App (Production) ───────────────────────────
  app-production:
    image: ${DOCKER_IMAGE:-react-vite-app}:${IMAGE_TAG:-latest}
    container_name: react-app-production
    restart: always
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    labels:
      - "app=react-vite-cicd"
      - "env=production"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - prod-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ── Prometheus ───────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus-production
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_prod_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.external-url=http://localhost:9090'
    networks:
      - prod-network

  # ── Grafana ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana-production
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme_in_prod}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_ANALYTICS_REPORTING_ENABLED=false
    volumes:
      - grafana_prod_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - prod-network
    depends_on:
      - prometheus

volumes:
  prometheus_prod_data:
  grafana_prod_data:

networks:
  prod-network:
    driver: bridge
